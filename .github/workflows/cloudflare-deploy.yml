name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: super-sean-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve canonical release version
        id: release
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check Cloudflare deployment credentials
        id: credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare deployment skipped. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as GitHub Actions secrets."
          fi

      - name: Install locked dependencies
        if: steps.credentials.outputs.ready == 'true'
        run: npm ci

      - name: Build and validate deployable release
        if: steps.credentials.outputs.ready == 'true'
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          npm run build 2>&1 | tee production-build.log
          npm run browser:smoke 2>&1 | tee production-browser-smoke.log

      - name: Deploy exact dist artifact to Cloudflare Pages
        if: steps.credentials.outputs.ready == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=super-sean-007-jrpg --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify production custom domain
        if: steps.credentials.outputs.ready == 'true'
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
          PRODUCTION_URL: https://supersean007.com
        run: |
          set -o pipefail
          npm run smoke:live -- --report=production-smoke-report.json 2>&1 | tee production-live-smoke.log

      - name: Deployment was not authorized
        if: steps.credentials.outputs.ready != 'true'
        run: |
          echo "### Cloudflare deployment not authorized" >> "$GITHUB_STEP_SUMMARY"
          echo "Add the repository secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID, then re-run this workflow." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload production deployment diagnostics
        if: always() && steps.credentials.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: super-sean-production-deploy-${{ github.sha }}
          path: |
            production-build.log
            production-browser-smoke.log
            production-live-smoke.log
            production-smoke-report.json
            dist/build-meta.json
            dist/performance-report.json
          if-no-files-found: warn
          retention-days: 30
