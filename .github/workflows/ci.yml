name: Build and validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: super-sean-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Build, test and validate production output
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-output.log
      - name: Run real Chrome gameplay smoke test
        run: |
          set -o pipefail
          npm run browser:smoke 2>&1 | tee browser-smoke-output.log
      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: super-sean-007-ci-diagnostics-${{ github.sha }}
          path: |
            build-output.log
            browser-smoke-output.log
          if-no-files-found: warn
          retention-days: 14
      - name: Upload deployable production artifact
        uses: actions/upload-artifact@v4
        with:
          name: super-sean-007-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 14
