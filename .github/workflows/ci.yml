name: Build and validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: super-sean-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Build, test and validate production output
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: npm run build
      - name: Run real Chrome gameplay smoke test
        run: npm run browser:smoke
      - name: Upload deployable production artifact
        uses: actions/upload-artifact@v4
        with:
          name: super-sean-007-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 14
