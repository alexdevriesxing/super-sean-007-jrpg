name: Sync commercial branch facts

on:
  push:
    branches: [agent/commercial-release-readiness]

permissions:
  contents: write

jobs:
  sync:
    if: ${{ !contains(github.event.head_commit.message, 'chore: sync canonical site facts') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/commercial-release-readiness
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run sync:site
      - name: Commit synchronized public files
        run: |
          if git diff --quiet; then
            echo "Public files already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add super_sean_007_full_project_wired/index.html \
                  super_sean_007_full_project_wired/llms.txt \
                  super_sean_007_full_project_wired/ai-summary.json \
                  super_sean_007_full_project_wired/sitemap.xml
          git commit -m "chore: sync canonical site facts"
          git push origin HEAD:agent/commercial-release-readiness
