<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Super Sean 007 — Analytics</title>
  <style>
    body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;margin:0;background:#0e2744;color:#eafaff;padding:24px;line-height:1.5}
    h1{font-size:1.6rem;margin:0 0 4px}
    .sub{color:#9fd3f2;margin:0 0 24px;font-size:.9rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:32px}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px}
    .card .n{font-size:2rem;font-weight:800;color:#ffd76a}
    .card .l{font-size:.8rem;color:#bcd6ea;text-transform:capitalize}
    h2{font-size:1.1rem;margin:24px 0 10px;color:#7cecff}
    .bars{display:flex;flex-direction:column;gap:6px}
    .barrow{display:grid;grid-template-columns:90px 1fr 40px;align-items:center;gap:8px;font-size:.8rem}
    .bar{height:16px;background:linear-gradient(90deg,#168ed0,#46d9db);border-radius:8px;min-width:2px}
    table{width:100%;border-collapse:collapse;font-size:.82rem}
    td,th{text-align:left;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.08);vertical-align:top}
    .err{color:#ff9b9b}
    .muted{color:#7fa8c4}
    button{background:#168ed0;border:0;color:#fff;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <h1>Super Sean 007 — Analytics</h1>
  <p class="sub">First-party, cookieless metrics · <button onclick="location.reload()">Refresh</button></p>
  <div class="grid" id="totals"></div>
  <h2>Last 14 days — pageviews &amp; new games</h2>
  <div class="bars" id="daily"></div>
  <h2>Recent errors</h2>
  <table id="errors"><tbody><tr><td class="muted">Loading…</td></tr></tbody></table>

  <script>
    const cap = s => s.replace(/_/g, ' ');
    async function load() {
      const stat = await fetch('/api/stat').then(r => r.json()).catch(() => ({totals:{},days:{}}));
      const totals = stat.totals || {};
      document.getElementById('totals').innerHTML = Object.keys(totals).sort((a,b)=>totals[b]-totals[a])
        .map(k => `<div class="card"><div class="n">${totals[k]||0}</div><div class="l">${cap(k)}</div></div>`).join('') || '<p class="muted">No data yet.</p>';

      const days = stat.days || {};
      const keys = Object.keys(days).sort().slice(-14);
      const max = Math.max(1, ...keys.map(d => (days[d].pageview||0)));
      document.getElementById('daily').innerHTML = keys.map(d => {
        const pv = days[d].pageview || 0, ng = days[d].new_game || 0;
        return `<div class="barrow"><span class="muted">${d.slice(5)}</span><div class="bar" style="width:${Math.round(pv/max*100)}%"></div><span>${pv}<span class="muted">/${ng}</span></span></div>`;
      }).join('') || '<p class="muted">No daily data yet.</p>';

      const errs = await fetch('/api/err').then(r => r.json()).catch(() => ({errors:[]}));
      const rows = (errs.errors || []).map(e =>
        `<tr><td class="muted">${new Date(e.at).toLocaleString()}</td><td class="err">${(e.msg||'').replace(/</g,'&lt;')}</td><td class="muted">${(e.url||'').replace(/</g,'&lt;')}:${e.line||0}</td></tr>`).join('');
      document.getElementById('errors').innerHTML = '<tbody>' + (rows || '<tr><td class="muted">No errors logged 🎉</td></tr>') + '</tbody>';
    }
    load();
  </script>
</body>
</html>
